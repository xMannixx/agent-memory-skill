name: Feature request
description: Propose a roadmap feature or improvement.
title: "feat: "
labels: ["type:feature"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template for planned roadmap work, retrieval improvements, CLI changes, schema changes, and plugin behavior.
  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What problem does this solve?
      placeholder: "Explain the practical problem and why it matters."
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What should be included?
      value: |
        - [ ] 
        - [ ] 
        - [ ] 
    validations:
      required: true
  - type: textarea
    id: out-of-scope
    attributes:
      label: Out of scope
      description: What should this issue deliberately avoid?
      placeholder: "List boundaries so the implementation stays focused."
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How do we know this is done?
      value: |
        - [ ] Tests cover the new behavior.
        - [ ] Documentation is updated where needed.
        - [ ] Existing memory data remains compatible.
    validations:
      required: true
  - type: dropdown
    id: tier
    attributes:
      label: Priority tier
      options:
        - tier:must-do
        - tier:high-value
        - tier:exploratory
        - tier:polish
    validations:
      required: true
